services:
  mysql:
    image: mysql:8.0
    container_name: streamhub-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-streamhub}
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: streamhub-redis

  nextjs:
    build: .
    container_name: nextjs-app
    ports:
      - "3002:3002"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ${DB_NAME:-streamhub}
      BIND_HOST: 0.0.0.0
      HOSTNAME: 127.0.0.1
      PORT: 3002
      NEXTAUTH_URL: http://127.0.0.1:3002
      REDIS_URL: redis://redis:6379
      RTMP_INGEST_URL: rtmp://nginx-rtmp:1935/live
      HLS_PUBLIC_URL: http://localhost:8080/hls
    depends_on:
      - mysql
      - redis

  nginx-rtmp:
    image: tiangolo/nginx-rtmp:latest
    container_name: streamhub-rtmp
    restart: unless-stopped
    ports:
      - "1935:1935"   # RTMP ingest for OBS
      - "8080:8080"   # HLS playback (http://localhost:8080/hls/<id>.m3u8)
    volumes:
      - ./nginx-rtmp/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - nextjs

volumes:
  mysql_data:
