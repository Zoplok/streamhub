services:
  ingest-app:
    build: .
    container_name: streamhub-ingest-app
    restart: unless-stopped
    env_file:
      - .env.ingest
    environment:
      NODE_ENV: production
      BIND_HOST: 0.0.0.0
      HOSTNAME: 0.0.0.0
      PORT: 3002
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://streamhub-seven.vercel.app}
      RTMP_INGEST_URL: rtmp://nginx-rtmp:1935/live
      HLS_PUBLIC_URL: ${HLS_PUBLIC_URL}
    ports:
      - "3002:3002"

  nginx-rtmp:
    image: tiangolo/nginx-rtmp:latest
    container_name: streamhub-ingest-rtmp
    restart: unless-stopped
    ports:
      - "1935:1935"
      - "8080:8080"
    volumes:
      - ./nginx-rtmp/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ingest-app
