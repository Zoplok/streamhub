worker_processes auto;
events { worker_connections 1024; }

# ---------- RTMP ingest + HLS transmuxing ----------
rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        ping 30s;
        notify_method get;

        application live {
            live on;
            record off;

            # HLS output
            hls on;
            hls_path /tmp/hls;
            hls_fragment 2s;
            hls_playlist_length 10s;
            hls_cleanup on;
            hls_nested off;
            hls_fragment_naming system;

            # ---- Auth + status webhooks ----
            # on_publish: StreamHub validates the stream key, flips status=live,
            #   and returns HTTP 302 Location: rtmp://.../live/<stream_id>
            #   so the HLS playlist is served as <stream_id>.m3u8 (not the secret key).
            on_publish      http://nextjs:3002/api/streams/ingest;
            on_publish_done http://nextjs:3002/api/streams/ingest-done;

            # No playback over RTMP — HLS only.
            allow publish all;
            deny play all;
        }
    }
}

# ---------- HTTP: serve HLS playlist + segments ----------
http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    server {
        listen 8080;

        # Health probe
        location = /healthz {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /tmp;
            add_header Cache-Control no-cache always;
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Headers Range always;
            add_header Access-Control-Expose-Headers Content-Length always;
        }

        # RTMP stats (useful for debugging)
        location = /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }
        location = /stat.xsl {
            root /usr/local/nginx/html;
        }
    }
}
